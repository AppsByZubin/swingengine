_metadata:
  major_version: 1
  minor_version: 1

display_information:
  name: SwingEngine
  description: Run SwingEngine commands from Slack
  background_color: "#1f2937"

features:
  bot_user:
    display_name: SwingEngine
    always_online: false
  slash_commands:
    - command: /swingengine
      description: Send a command to SwingEngine
      usage_hint: help | ping | status
      should_escape: false

oauth_config:
  scopes:
    bot:
      - commands

settings:
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
  is_hosted: false
