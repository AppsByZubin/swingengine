name: Build and publish SwingEngine image

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: swingengine-docker-publish
  cancel-in-progress: true

env:
  IMAGE_REPOSITORY: bizzkpm/swingengine
  BOTYARD_REPOSITORY: AppsByZubin/botyard
  BOTYARD_VALUES_FILE: helm/swingengine/values.yaml

jobs:
  build-push-update-helm:
    runs-on: ubuntu-latest

    steps:
      - name: Check out SwingEngine
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Test
        run: |
          python -m pip install -r requirements-dev.txt
          pytest -q

      - name: Set image tag
        shell: bash
        run: echo "IMAGE_TAG=sha-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
            docker.io/${{ env.IMAGE_REPOSITORY }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=swingengine
          cache-to: type=gha,mode=max,scope=swingengine

      - name: Check out Botyard
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BOTYARD_REPOSITORY }}
          token: ${{ secrets.BOTYARD_REPO_TOKEN }}
          ref: master
          path: botyard

      - name: Update SwingEngine Helm image tag
        working-directory: botyard
        shell: bash
        run: |
          set -euo pipefail
          sed -i -E "s/^  tag: .*/  tag: \"${IMAGE_TAG}\"/" "${BOTYARD_VALUES_FILE}"
          git diff --check -- "${BOTYARD_VALUES_FILE}"
          git diff -- "${BOTYARD_VALUES_FILE}"

      - name: Commit and push Helm image tag
        working-directory: botyard
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- "${BOTYARD_VALUES_FILE}"; then
            echo "SwingEngine Helm image tag is already ${IMAGE_TAG}; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${BOTYARD_VALUES_FILE}"
          git commit -m "Update SwingEngine image tag to ${IMAGE_TAG}"
          git pull --rebase origin master
          git push origin HEAD:master
